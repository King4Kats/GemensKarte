name: Fetch RNA data

# Télécharge le Répertoire National des Associations (fichier waldec) depuis
# data.gouv.fr — possible ici car les runners GitHub ont un accès réseau ouvert,
# contrairement à l'environnement de dev. Filtre sur le périmètre couvert,
# compresse en .csv.gz et PUBLIE le résultat en Release asset (tag rna-latest).
# Le fichier n'est PLUS versionné dans le dépôt : trop volumineux (limite GitHub
# 100 Mo/fichier) et il grossit à chaque département ajouté. Côté consommateur,
# scripts/get-rna.sh le télécharge depuis la Release avant `pnpm import:rna`.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 5 * *" # le 5 de chaque mois (le RNA est publié mensuellement)
  push:
    paths:
      - ".github/workflows/fetch-rna.yml" # se déclenche quand on (re)pousse ce workflow

permissions:
  contents: write

concurrency:
  group: fetch-rna-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Télécharger le fichier RNA waldec
        run: |
          set -euo pipefail
          UA="Mozilla/5.0 (X11; Linux x86_64) GemensKarte-bot"

          find_csv() { # $1 = slug du dataset → imprime l'URL d'une ressource CSV waldec
            curl -fsSL -A "$UA" "https://www.data.gouv.fr/api/1/datasets/$1/" -o ds.json
            jq -r '
              [ .resources[]
                | select((.format // "" | ascii_downcase) == "csv")
                | select(((.title // "") + " " + (.url // "")) | ascii_downcase | test("waldec"))
              ] | (.[0].url // empty)' ds.json
          }

          URL="$(find_csv rna-agrege-a-lechelle-nationale || true)"
          if [ -z "${URL:-}" ]; then
            echo "Agrégé indisponible, repli sur le dataset principal…"
            URL="$(find_csv repertoire-national-des-associations || true)"
          fi
          if [ -z "${URL:-}" ]; then
            echo "::error::Aucune ressource CSV waldec trouvée sur data.gouv.fr"; exit 1
          fi
          echo "Ressource : $URL"
          curl -fSL -A "$UA" "$URL" -o rna_raw

          # Déballe selon le type réel (csv brut, gzip ou zip)
          TYPE="$(file -b --mime-type rna_raw || echo unknown)"
          echo "type=$TYPE"
          case "$TYPE" in
            application/gzip|application/x-gzip) gunzip -c rna_raw > rna.csv ;;
            application/zip) unzip -p rna_raw '*.csv' > rna.csv ;;
            *) mv rna_raw rna.csv ;;
          esac
          echo "lignes brutes : $(wc -l < rna.csv)"

      - name: Normaliser (toute la France) et compresser
        run: |
          set -euo pipefail
          mkdir -p data/rna
          echo "En-tête du fichier source :"
          head -1 rna.csv
          python3 - <<'PY'
          import csv, gzip
          csv.field_size_limit(10_000_000)
          src = "rna.csv"
          dst = "data/rna/rna_france.csv.gz"

          # Détecte le séparateur sur la 1re ligne (l'agrégé peut être en ',' ou ';')
          with open(src, newline="", encoding="utf-8", errors="replace") as f:
              first = f.readline()
          delim = ";" if first.count(";") >= first.count(",") else ","
          print(f"séparateur détecté : {delim!r}")

          with open(src, newline="", encoding="utf-8", errors="replace") as f, \
               gzip.open(dst, "wt", encoding="utf-8", newline="") as out:
              r = csv.reader(f, delimiter=delim)
              w = csv.writer(out, delimiter=";")  # on normalise en ';' (lu par l'importeur)
              header = next(r)
              print("colonnes :", ";".join(header))
              w.writerow(header)
              kept = 0
              # TOUTE LA FRANCE : on ne filtre plus par département (RNA national complet).
              for row in r:
                  w.writerow(row); kept += 1
          print(f"associations conservées : {kept}")
          PY
          SZ=$(stat -c%s data/rna/rna_france.csv.gz)
          echo "taille gz : $SZ octets"
          # Publié en Release asset (plafond 2 Go), plus dans le dépôt : garde-fou large.
          if [ "$SZ" -gt 1900000000 ]; then
            echo "::error::Fichier > 1,9 Go : dépasse la limite d'un asset de Release."; exit 1
          fi

      - name: Publier le fichier en Release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="rna-latest"
          # Crée la release si absente (idempotent), puis remplace l'asset existant.
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "RNA — données courantes" \
              --notes "Fichier RNA waldec national (toute la France), régénéré automatiquement. Volumineux → publié ici plutôt que versionné. Récupération via scripts/get-rna.sh."
          gh release upload "$TAG" data/rna/rna_france.csv.gz --clobber
          echo "Asset rna_france.csv.gz publié sur la release $TAG."
