server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API NestJS (préfixe global /api) → service api:3000
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pages SEO (générées par l'API, hors préfixe /api) : pages par commune + sitemap.
    # Une regex route les slugs des départements couverts (Vendée + Occitanie) vers l'API ;
    # tout le reste reste sur la SPA. Indexables par Google ; non liées depuis la SPA.
    location ~ ^/(territoires|vendee|ariege|aude|aveyron|gard|haute-garonne|gers|lot|lozere|hautes-pyrenees|pyrenees-orientales|tarn|tarn-et-garonne)(/|$) {
        rewrite ^(.*)$ /api/seo$1 break;
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /sitemap.xml {
        proxy_pass http://api:3000/api/seo/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Assets Vite (noms content-hashés : index-AbC123.js). Le nom change à CHAQUE
    # build → on peut les cacher « pour toujours » sans risque de version périmée.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html ne doit JAMAIS être figé : sinon un visiteur garde un vieux HTML
    # qui référence des bundles supprimés au déploiement suivant → page blanche /
    # « vieux site » sur certains navigateurs. no-cache = revalidé à chaque visite
    # (304 si inchangé, quasi gratuit).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
